<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime Gallery - Mobile Responsive</title>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        h1 {
            color: #ffdd40;
            margin: 15px 0;
            font-size: 1.6rem;
            text-align: center;
        }

        /* Responsive Main Video Wrapper */
        .main-video-wrapper {
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            border: 2px solid #ffdd40;
        }

        /* Perfect 16:9 Aspect Ratio Container for Google Drive Player */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .main-video-wrapper h2 {
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 16px;
            padding: 0 5px;
        }

        /* Episodes Container */
        .episodes-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 20px;
        }

        /* Chhote Episode Cards */
        .episode-card {
            background-color: #212121;
            border-radius: 8px;
            padding: 8px;
            width: 46%; /* Mobile par side-by-side perfect aayega */
            min-width: 140px;
            max-width: 220px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .episode-card:hover {
            transform: scale(1.03);
            background-color: #303030;
        }

        .episode-card.active {
            border-color: #ffdd40;
            background-color: #2b2b2b;
        }

        .thumbnail-box {
            width: 100%;
            height: 85px;
            background-color: #3a3a3a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .episode-card h4 {
            margin: 0;
            font-size: 12px;
            color: #ececec;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>My Anime Collection</h1>

    <div class="main-video-wrapper">
        <div class="video-container">
            <iframe id="main-player" src="https://drive.google.com/file/d/1Y3uSM0xDqecKGupZKlBG_A0PqO39-18c/preview" allow="autoplay" allowfullscreen></iframe>
        </div>
        <h2 id="main-video-title">Horimiya - Episode 1</h2>
    </div>

    <div class="episodes-container">
        <div class="episode-card active" data-video="https://drive.google.com/file/d/1Y3uSM0xDqecKGupZKlBG_A0PqO39-18c/preview" data-title="Horimiya - Episode 1" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 1</div>
            <h4>Horimiya - Episode 1</h4>
        </div>

        <div class="episode-card" data-video="https://drive.google.com/file/d/1I9GBNC5QTKguHSTt-HVXozq1zZdVKpmS/preview" data-title="Horimiya - Episode 2" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 2</div>
            <h4>Horimiya - Episode 2</h4>
        </div>
        
        <div class="episode-card" data-video="https://drive.google.com/file/d/12WTV78cD6YGw-esq67gRhpJdKh7N8bKz/preview" data-title="Horimiya - Episode 3" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 3</div>
            <h4>Horimiya - Episode 3</h4>
        </div>

        <div class="episode-card" data-video="https://drive.google.com/file/d/1QqL_U_AETu-pMGXW9jp6Tf2vehwEUb2w/preview" data-title="Horimiya - Episode 4" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 4</div>
            <h4>Horimiya - Episode 4</h4>
        </div>
    </div>

<script>
    const mainPlayer = document.getElementById('main-player');
    const mainTitle = document.getElementById('main-video-title');
    const allCards = document.querySelectorAll('.episode-card');

    function changeVideo(cardElement) {
        const newVideoSrc = cardElement.getAttribute('data-video');
        const newVideoTitle = cardElement.getAttribute('data-title');

        mainPlayer.src = newVideoSrc;
        mainTitle.innerText = newVideoTitle;

        allCards.forEach(card => card.classList.remove('active'));
        cardElement.classList.add('active');
    }
</script>

</body>
</html>
