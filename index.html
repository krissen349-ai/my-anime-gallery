<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime Gallery - Mobile Responsive</title>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px; /* Mobile ke liye padding kam ki */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffdd40;
            margin-bottom: 20px;
            font-size: 1.8rem; /* Mobile par heading auto-adjust hogi */
            text-align: center;
        }

        /* Main Video Player (Mobile aur Desktop dono ke liye responsive) */
        .main-video-wrapper {
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            border: 2px solid #ffdd40;
        }

        .main-video-wrapper video {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }

        .main-video-wrapper h2 {
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 18px;
        }

        /* Episodes Container */
        .episodes-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }

        /* Chhote Episode Cards - Mobile responsive size */
        .episode-card {
            background-color: #212121;
            border-radius: 8px;
            padding: 10px;
            width: 45%; /* Mobile screen par ek line mein 2 cards aayenge */
            min-width: 140px; /* Bohot zyada chhota na ho */
            max-width: 220px; /* Desktop par size control mein rahe */
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .episode-card:hover {
            transform: scale(1.05);
            background-color: #303030;
        }

        .episode-card.active {
            border-color: #ffdd40;
            background-color: #2b2b2b;
        }

        .thumbnail-box {
            width: 100%;
            height: 90px; /* Mobile ke liye height thodi kam ki */
            background-color: #3a3a3a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .episode-card h4 {
            margin: 0;
            font-size: 13px;
            color: #ececec;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Bada naam hone par dot dot (...) aa jayega */
        }
    </style>
</head>
<body>

    <h1>My Anime Collection</h1>

    <div class="main-video-wrapper">
        <video id="main-player" src="video1.mp4" controls autoplay muted playsinline>
            Your browser does not support the video tag.
        </video>
        <h2 id="main-video-title">Horimiya - Episode 1</h2>
    </div>

    <div class="episodes-container">
        <div class="episode-card active" data-video="video1.mp4" data-title="Horimiya - Episode 1" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 1</div>
            <h4>Horimiya - Episode 1</h4>
        </div>

        <div class="episode-card" data-video="video2.mp4" data-title="Horimiya - Episode 2" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 2</div>
            <h4>Horimiya - Episode 2</h4>
        </div>
        
        <div class="episode-card" data-video="video3.mp4" data-title="Horimiya - Episode 3" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 3</div>
            <h4>Horimiya - Episode 3</h4>
        </div>

        <div class="episode-card" data-video="video4.mp4" data-title="Horimiya - Episode 4" onclick="changeVideo(this)">
            <div class="thumbnail-box">▶ Ep 4</div>
            <h4>Horimiya - Episode 4</h4>
        </div>
    </div>

<script>
    const mainPlayer = document.getElementById('main-player');
    const mainTitle = document.getElementById('main-video-title');
    const allCards = document.querySelectorAll('.episode-card');

    function changeVideo(cardElement) {
        const newVideoSrc = cardElement.getAttribute('data-video');
        const newVideoTitle = cardElement.getAttribute('data-title');

        mainPlayer.src = newVideoSrc;
        mainTitle.innerText = newVideoTitle;

        allCards.forEach(card => card.classList.remove('active'));
        cardElement.classList.add('active');

        mainPlayer.muted = false; 
        mainPlayer.play();
    }
</script>

</body>
</html>
