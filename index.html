<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime Gallery - Mobile Responsive</title>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        h1 {
            color: #ffdd40;
            margin: 20px 0;
            font-size: 1.8rem;
            text-align: center;
        }

        .welcome-box {
            width: 100%;
            max-width: 500px;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            margin-bottom: 25px;
            border: 2px solid #ffdd40;
        }

        .welcome-box p {
            margin: 0;
            font-size: 14px;
            color: #cccccc;
        }

        /* Episodes Container */
        .episodes-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 20px;
        }

        /* Chhote Episode Cards */
        .episode-card {
            background-color: #212121;
            border-radius: 8px;
            padding: 10px;
            width: 46%; /* Mobile side-by-side perfect arrangement */
            min-width: 140px;
            max-width: 220px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
            box-sizing: border-box;
            text-align: center;
        }

        .episode-card:hover {
            transform: scale(1.03);
            background-color: #303030;
        }

        .thumbnail-box {
            width: 100%;
            height: 90px;
            background-color: #ffdd40;
            color: #0f0f0f;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 221, 64, 0.2);
        }

        .episode-card h4 {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: #ececec;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>My Anime Collection</h1>

    <div class="welcome-box">
        <p>👇 Neeche kisi bhi Episode par click karein, video turant player mein chalne lagega!</p>
    </div>

    <div class="episodes-container">
        <div class="episode-card" onclick="playVideo('https://drive.google.com/file/d/1Y3uSM0xDqecKGupZKlBG_A0PqO39-18c/view?usp=sharing')">
            <div class="thumbnail-box">▶</div>
            <h4>Horimiya - Ep 1</h4>
        </div>

        <div class="episode-card" onclick="playVideo('https://drive.google.com/file/d/1I9GBNC5QTKguHSTt-HVXozq1zZdVKpmS/view?usp=sharing')">
            <div class="thumbnail-box">▶</div>
            <h4>Horimiya - Ep 2</h4>
        </div>
        
        <div class="episode-card" onclick="playVideo('https://drive.google.com/file/d/12WTV78cD6YGw-esq67gRhpJdKh7N8bKz/view?usp=sharing')">
            <div class="thumbnail-box">▶</div>
            <h4>Horimiya - Ep 3</h4>
        </div>

        <div class="episode-card" onclick="playVideo('https://drive.google.com/file/d/1QqL_U_AETu-pMGXW9jp6Tf2vehwEUb2w/view?usp=sharing')">
            <div class="thumbnail-box">▶</div>
            <h4>Horimiya - Ep 4</h4>
        </div>
    </div>

<script>
    function playVideo(videoUrl) {
        // Yeh line mobile browser ko direct Google Drive player par redirect karegi jahan 100% makkhan chalega
        window.open(videoUrl, '_blank');
    }
</script>

</body>
</html>
